<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 4 - Member Registration</title>
    <link rel="stylesheet" href="assignment4.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">My Website</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="assignment4.html" class="active">Member</a></li>
        </ul>
    </nav>

    <header class="banner">
        <h1>Member Registration</h1>
        <p>Join our website by filling out the form below</p>
    </header>

    <main class="container">
        <section class="form-card">
            <h2>Please complete all the fields below</h2>

            <form id="registrationForm" novalidate>
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName">
                    <small class="error" id="firstNameError"></small>
                </div>

                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName">
                    <small class="error" id="lastNameError"></small>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address">
                    <small class="error" id="addressError"></small>
                </div>

                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city">
                    <small class="error" id="cityError"></small>
                </div>

                <div class="form-group">
                    <label for="postalCode">Postal Code</label>
                    <input type="text" id="postalCode" name="postalCode" placeholder="A1A 1A1">
                    <small class="error" id="postalCodeError"></small>
                </div>

                <div class="form-group">
                    <label for="province">Province</label>
                    <select id="province" name="province">
                        <option value="">Select Province</option>
                        <option value="QC">QC</option>
                        <option value="ON">ON</option>
                        <option value="MN">MN</option>
                        <option value="SK">SK</option>
                        <option value="AB">AB</option>
                        <option value="BC">BC</option>
                    </select>
                    <small class="error" id="provinceError"></small>
                </div>

                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age">
                    <small class="error" id="ageError"></small>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password">
                    <small class="error" id="passwordError"></small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword">
                    <small class="error" id="confirmPasswordError"></small>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="text" id="email" name="email">
                    <small class="error" id="emailError"></small>
                </div>

                <div class="button-group">
                    <button type="submit">Register Now</button>
                    <button type="reset">Clear Form</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Andrew Miller. Centennial College.</p>
    </footer>

    <script src="assignment4.js"></script>
</body>
</html>
