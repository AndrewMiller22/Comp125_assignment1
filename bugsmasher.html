<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Smasher</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }

    h1 {
      color: #333;
    }

    #gameCanvas {
      background: url('images/leaf.jpg') no-repeat center center;
      background-size: cover;
      border: 3px solid #222;
      display: block;
      margin: 20px auto;
      touch-action: manipulation;
    }

    .controls {
      margin: 15px;
    }

    button {
      padding: 10px 18px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background-color: #3b5bd6;
      color: white;
    }

    #score {
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>
<body>

 <h1>Bug Smasher</h1>
<p id="score">Score: 0</p>
<p id="timer">Time Left: 60s</p>

<div class="controls">
  <button id="resetScoreBtn">Reset Score</button>
  <button id="resetSpeedBtn">Reset Speed</button>
</div>

<canvas id="gameCanvas" width="700" height="400"></canvas>

  <script src="bugsmasher.js"></script>
</body>
</html>
